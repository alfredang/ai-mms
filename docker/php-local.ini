; Local-dev-only PHP overrides. Mounted via docker-compose.yml as
; /usr/local/etc/php/conf.d/zz-local.ini so it loads after magento.ini and wins.
; NOT copied by Dockerfile — production (Coolify) never sees this file.

; Re-enable timestamp validation so edits to .phtml/.php on the Windows host
; are picked up without rebuilding the image. revalidate_freq=10 means OPcache
; only stats each file every 10 seconds instead of every request — major
; speedup on the slow Windows bind mount, at the cost of edits taking up to
; 10s to appear (or you can `docker restart project-web-1` to flush instantly).
opcache.validate_timestamps = 1
opcache.revalidate_freq = 10
