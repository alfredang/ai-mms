; Magento PHP Configuration
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
upload_max_filesize = 64M
post_max_size = 64M
max_input_vars = 10000

; Error reporting (dev mode)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On

; Session — 20 minutes of inactivity before server-side GC (matches
; admin/security/session_lifetime in core_config_data, migration 022)
session.gc_maxlifetime = 1200
session.cookie_httponly = 1

; Date
date.timezone = Asia/Singapore

; OPcache — production-tuned defaults.
; Local dev re-enables validate_timestamps=1 via docker/php-local.ini (mounted
; through docker-compose.yml only). In prod (Coolify) opcache is reset on each
; container restart at deploy time, so timestamp validation per-request is
; pure overhead and we turn it off.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 64
opcache.max_accelerated_files = 100000
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
opcache.jit = tracing
opcache.jit_buffer_size = 256M
opcache.huge_code_pages = 0

; Realpath cache — bigger & longer TTL to reduce filesystem hits
realpath_cache_size = 32768K
realpath_cache_ttl = 7200
