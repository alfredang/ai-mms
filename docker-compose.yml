services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      # cached = Windows→Linux reads can be briefly stale, non-blocking — much faster
      - .:/var/www/html:cached
      - ./docker/php.ini:/usr/local/etc/php/conf.d/magento.ini
      # Local-only override: turns opcache.validate_timestamps back on for dev.
      # Loads after magento.ini (zz- prefix → alphabetical last). Not in prod image.
      - ./docker/php-local.ini:/usr/local/etc/php/conf.d/zz-local.ini
    environment:
      - MAGE_IS_DEVELOPER_MODE=0
    depends_on:
      db_mysql:
        condition: service_healthy
    networks:
      - magento_net

  db_mysql:
    image: mysql:5.7
    platform: linux/amd64
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: >
      --max_allowed_packet=256M
      --innodb_buffer_pool_size=512M
      --character-set-server=utf8
      --collation-server=utf8_general_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - magento_net

volumes:
  mysql_data:

networks:
  magento_net:
    driver: bridge
